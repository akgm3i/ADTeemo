volumes:
  prod-db-data: {}
  deno-cache: {}

services:
  # --- Production services (activate with --profile prod) ---
  api:
    profiles:
      - prod
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
      target: api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - prod-db-data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: file:/app/data/sqlite.db
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - deno
        - run
        - --allow-net=localhost:8000
        - /app/docker/healthcheck.ts
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 10s

  bot:
    profiles:
      - prod
    image: adteemo-bot:local
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
      target: bot
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  # Explicit one-shot operation. Normal Bot startup never changes commands.
  command-deployer:
    profiles:
      - commands
    image: adteemo-bot:local
    build:
      context: .
      dockerfile: ./docker/Dockerfile.prod
      target: bot
    env_file:
      - .env
    command:
      - deno
      - run
      - --allow-net
      - --allow-read
      - --allow-env
      - --allow-sys
      - --allow-ffi
      - src/deploy-commands.ts

  # --- Development service (activate with --profile dev) ---
  dev:
    profiles:
      - dev
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dev
    command: tail -f /dev/null
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - deno-cache:/deno-dir
    env_file:
      - .env.dev

  # --- Tools service (activate with --profile tools) ---
  db-tools:
    profiles:
      - tools
    image: alpine:latest
    volumes:
      - prod-db-data:/prod-data
      - ./data:/data
